Stimulant that inhibits reuptake of dopamine and noradrenaline\nHepatic metabolism via carboxylesterase CES1A1; half life 2-4 hours","indications":"FDA approval: ADHD (adults and children >=6 years), Narcolepsy\nOff label: Apathetic depression in the elderly or medically ill","side_effects":"Most common: Stomach discomfort/nausea, Headache, Loss of appetite and weight, Insomnia, Anxiety, Dry mouth\n\nSerious but rare:\n- Increase in blood pressure and heart rate\n- Tics\n- Worsening agitation\n- New or worsening psychosis\n\nPregnancy and Breastfeeding: Limited data","drug_interactions":"Avoid use with MAOIs","monitoring":"ECG (if history of cardiac disease)\nBMI, BP and HR","dosage":"IMH: Ritalin 10mg tablet; $0.29\nStarting: 5mg OM/BD, increase by 10mg/d at weekly intervals. Range: 5-30mg OD. Max: 60mg OD.","clinical_pearls":"Cochrane review showed methylphenidate did not worsen tics in children with ADHD and a tic disorder.","healthhub_slug":"methylphenidate"},{"id":"methylphenidate_er","name":"Methylphenidate ER (Medikinet/Ritalin LA/Concerta)","category":"ADHD Medications","bottom_line":"Choose based on duration of action required - 8H (Medikinet, Ritalin LA), 12H (Concerta). Medikinet and Ritalin LA can be opened and sprinkled on food.","mechanism":"Stimulant that inhibits reuptake of dopamine and noradrenaline\nHepatic metabolism via carboxylesterase CES1A1","indications":"FDA approval: ADHD (adults and children >=6 years), Narcolepsy\nOff label: Apathetic depression","side_effects":"Most common: Stomach discomfort/nausea, Headache, Loss of appetite and weight, Insomnia, Anxiety, Dry mouth\n\nSerious but rare:\n- Increase in blood pressure and heart rate\n- Tics\n- Worsening agitation\n- New or worsening psychosis\n\nPregnancy and Breastfeeding: Limited data","drug_interactions":"Avoid use with MAOIs","monitoring":"ECG (if history of cardiac disease)\nBMI, BP and HR","dosage":"IMH:\nMedikinet: 5/10/20/30mg; $0.97-$1.70. Starting 10mg/day. Max: 80mg/day.\nRitalin LA: 20mg; $1.66. Starting 10-20mg/day. Max 80mg/day.\nConcerta: 18/27/36/54mg; $2.82-$3.95. Starting 18mg/day. Max: 72mg/day.","clinical_pearls":"Concerta has 20% lower bioavailability than methylphenidate. 15mg Ritalin = 18mg Concerta, 30mg Ritalin = 36mg Concerta.","healthhub_slug":"methylphenidate"},{"id":"lisdexamfetamine","name":"Lisdexamfetamine (Vyvanse)","category":"ADHD Medications","bottom_line":"May have a gentler, 'smoother' side effect profile than other amphetamines and a lower risk of diversion/abuse. However, cost is high.","mechanism":"Stimulant; dextroamphetamine with lysine bound to it, remains inactive until hydrolysis by red blood cells\nHalf life of active metabolite dextroamphetamine is 12 hours","indications":"FDA approval: ADHD (adults and children >=6 years); binge eating disorder (BED)\nOff label: Narcolepsy, Treatment resistant depression","side_effects":"Most common: Stomach discomfort/nausea, Headache, Loss of appetite and weight, Insomnia, Anxiety, Dry mouth\n\nSerious but rare:\n- Increase in blood pressure and heart rate\n- Tics\n- Worsening agitation\n- New or worsening psychosis\n\nPregnancy and Breastfeeding: Not recommended in breastfeeding","drug_interactions":"Avoid use with MAOIs\nAvoid antacids (alkaline) - decrease excretion\nAvoid vitamin C/acidic juices - increase excretion, decreasing efficacy","monitoring":"ECG (if history of cardiac disease)\nBMI, BP and HR","dosage":"IMH: Vyvanse 30/40/50/70mg; $4.29-$6.43\nStarting: 30mg, increase 10mg/d at weekly intervals. Range: 30-70mg. Max: 70mg.","clinical_pearls":"Warn patients to avoid vitamin C or orange juice - decreases levels.\nTaking with food delays onset slightly.","healthhub_slug":"lisdexamfetamine"},{"id":"alprazolam","name":"Alprazolam","category":"Anxiolytics / Benzodiazepines","bottom_line":"Fast acting, effective for short term treatment GAD and panic disorder. However, short duration of action leads to breakthrough symptoms, dependency and abuse potential.","mechanism":"Binds to Benzodiazepine receptors to enhance GABA effects\nMetabolized through CYP3A4, half life 11 hours","indications":"FDA approval: Acute treatment of GAD and Panic disorder\nOff label: Other anxiety disorders, insomnia, acute mania, catatonia","side_effects":"Most common: Sedation, Slurred speech, Incoordination, Memory impairment, Dependence\n\nSerious but rare:\n- Anterograde amnesia\n- Paradoxical disinhibition\n- Increased falls risk\n- Respiratory depression\n\nPregnancy and Breastfeeding: Potential risks, use caution","drug_interactions":"Avoid concurrent use with other CNS depressants including alcohol and opioids.\nPotent CYP3A4 inhibitors may increase levels","monitoring":"No routine monitoring","dosage":"IMH: Alprazolam (Xanax) 0.25mg; $0.25\nGAD: Starting: 0.25-0.5mg TDS. Max: 4mg/d.\nPanic disorder: Starting: 0.5mg TDS. Max 10mg/d.\nEquivalence: 0.5mg alprazolam = 10mg diazepam","clinical_pearls":"Very effective for GAD and panic disorder, especially in early weeks of SSRI therapy.\nParadoxical reaction more likely in the elderly or those with brain injury.","healthhub_slug":"alprazolam"},{"id":"clonazepam","name":"Clonazepam","category":"Anxiolytics / Benzodiazepines","bottom_line":"Longer half-life causes fewer breakthrough symptoms versus alprazolam. Good short-term hypnotic.","mechanism":"Binds to Benzodiazepine receptors to enhance GABA effects\nMetabolized through CYP3A4, half life 18-50 hours","indications":"FDA approval: Seizure disorder, Panic disorder\nOff label: Other anxiety disorders, insomnia, acute mania, catatonia","side_effects":"Most common: Sedation, Slurred speech, Incoordination, Memory impairment, Dependence\n\nSerious but rare:\n- Anterograde amnesia\n- Paradoxical disinhibition\n- Increased falls risk\n- Respiratory depression\n\nPregnancy and Breastfeeding: Potential risks, use caution","drug_interactions":"Avoid concurrent use with other CNS depressants.\nPotent CYP3A4 inhibitors may increase levels","monitoring":"No routine monitoring","dosage":"IMH: Clonazepam (Rivotril) 0.5mg; $0.37\nAnxiety: Starting: 0.5mg BD. Max: 6mg/d divided BD/TDS.\nInsomnia: Starting: 0.25-0.5mg BT PRN. Max: 2mg BT.\nEquivalence: 0.5mg clonazepam = 10mg diazepam","clinical_pearls":"Withdrawal effects may not be seen until 3-5 days after abrupt discontinuation due to long half life.","healthhub_slug":"clonazepam"},{"id":"diazepam","name":"Diazepam","category":"Anxiolytics / Benzodiazepines","bottom_line":"Long history of use with good efficacy for anxiety. Long half-life makes it particularly effective. Also used in alcohol withdrawal.","mechanism":"Binds to Benzodiazepine receptors to enhance GABA effects\nMetabolized through CYP3A4, active metabolite nordazepam has half life >100 hours","indications":"FDA approval: GAD, alcohol withdrawal, seizures, muscle spasms\nOff label: Other anxiety disorders, insomnia, acute mania, catatonia","side_effects":"Most common: Sedation, Slurred speech, Incoordination, Memory impairment, Dependence\n\nSerious but rare:\n- Anterograde amnesia\n- Paradoxical disinhibition\n- Increased falls risk\n- Respiratory depression\n\nPregnancy and Breastfeeding: Potential risks","drug_interactions":"Avoid concurrent use with other CNS depressants.\nPotent CYP3A4 inhibitors may increase levels","monitoring":"No routine monitoring","dosage":"IMH: Diazepam (Valium) 2/5/10mg tabs; $0.20\nAnxiety: Starting: 2-5mg BD. Max: 40mg/d divided BD-QDS.\nEquivalences: 10mg Diazepam = 1mg Lorazepam = 15mg Zopiclone = 20mg Zolpidem = 0.5mg Alprazolam/Clonazepam","clinical_pearls":"Tolerance to sedative effect develops more rapidly (within 2-4 weeks) than tolerance to anxiolytic effect.\nWithdrawal effects may not be seen until 3-5d after abrupt discontinuation.","healthhub_slug":"diazepam-oral"},{"id":"lorazepam","name":"Lorazepam","category":"Anxiolytics / Benzodiazepines","bottom_line":"First line agent when benzo is appropriate; preferred in hepatic impairment or when pregnancy is a concern.","mechanism":"Binds to Benzodiazepine receptors to enhance GABA effects\nPrimarily hepatic metabolism (non CYP450), half life 10-20 hrs","indications":"FDA approval: GAD, status epilepticus\nOff label: Other anxiety disorders, insomnia, acute mania, catatonia","side_effects":"Most common: Sedation, Slurred speech, Incoordination, Memory impairment, Dependence\n\nSerious but rare:\n- Anterograde amnesia\n- Paradoxical disinhibition\n- Increased falls risk\n- Respiratory depression\n\nPregnancy and Breastfeeding: Preferred in pregnancy/lactation due to lack of active metabolites","drug_interactions":"Avoid concurrent use with other CNS depressants.\nValproate can decrease lorazepam clearance","monitoring":"No routine monitoring","dosage":"IMH: Lorazepam (Ativan) 0.5/1mg tab; $0.20\nAnxiety: Starting: 0.5-1mg BD/TDS. Range: 2-6mg/d. Max: 10mg/d.\nInsomnia: Starting 0.5-1mg ON. Max: 4mg ON.\nEquivalence: 1mg lorazepam = 10mg diazepam","clinical_pearls":"Does not have active metabolites that could accumulate, no CYP450 drug interaction risk.\nSuitable for alcohol detox in liver dysfunction (Lorazepam for Liver damage).","healthhub_slug":"lorazepam"},{"id":"zolpidem","name":"Zolpidem","category":"Sleep Medications","bottom_line":"Original Z-drug. Effective for sleep onset and maintenance, less residual morning effects due to shorter half life.","mechanism":"Selective GABA-A alpha 1 subunit agonist\nMetabolized through CYP3A4","indications":"FDA approval: Insomnia (sleep onset and maintenance)","side_effects":"Most common: Headache, somnolence, dizziness, diarrhea\n\nSerious but rare:\n- Complex sleep related behaviour (sleep driving, cooking, eating)\n- Disinhibition\n\nPregnancy and Breastfeeding: Limited data suggests relative safety","drug_interactions":"Avoid concurrent use with other CNS depressants.\nPotent CYP3A4 inhibitors may increase levels","monitoring":"No routine monitoring","dosage":"IMH: Stilnox (CR) 6.25/12.5mg; $1.10, $1.93\nStarting: 6.25-12.5mg BT. Range: 6.25-12.5mg. Max: 12.5mg.\nTake immediately before bed with at least 7-8 hours remaining.","clinical_pearls":"Compared to benzos, preserves sleep stages (REM and deep sleep) better.\nCR formulation has dual layer for immediate + gradual release.","healthhub_slug":"zolpidem"},{"id":"zopiclone","name":"Zopiclone","category":"Sleep Medications","bottom_line":"Z-drug not FDA approved. Effective for sleep onset and maintenance, longer half life may provide more sustained sleep.","mechanism":"Non-selective GABA-A agonist\nMetabolized through CYP3A4 and CYP2C8","indications":"FDA approval: None (Eszopiclone is FDA approved for Insomnia)","side_effects":"Most common: Somnolence, Metallic/bitter taste, dry mouth, Nausea/vomiting, Dizziness, Headache\n\nSerious but rare:\n- Complex sleep related behaviour\n- Disinhibition\n\nPregnancy and Breastfeeding: Generally avoided","drug_interactions":"Avoid concurrent use with other CNS depressants.\nPotent CYP3A4 inhibitors may increase levels","monitoring":"No routine monitoring","dosage":"IMH: Imovane 7.5mg; $0.40\nStarting: 3.75-7.5mg BT. Range: 7.5mg. Max: 15mg.","clinical_pearls":"Bitter metallic taste is a frequent complaint.\nZopiclone half life (5-7 hours) vs Zolpidem (2.5 hours) - Zopiclone may provide more sustained sleep.","healthhub_slug":"zopiclone"},{"id":"lemborexant","name":"Lemborexant","category":"Sleep Medications","bottom_line":"Newer generation DORA FDA approved for sleep onset and sleep maintenance.","mechanism":"DORA: Dual Orexin (OX1 and OX2) receptor antagonist\nMetabolized through CYP3A4","indications":"FDA approval: Insomnia (sleep onset and maintenance)","side_effects":"Most common: Drowsiness, Dizziness, Headache\n\nSerious but rare:\n- Impaired alertness and motor coordination\n- Worsening depression or suicidal ideations\n- Complex sleep related behaviour\n- Sleep paralysis\n- Cataplexy-like symptoms\n- Contraindications: Narcolepsy\n\nPregnancy and Breastfeeding: Not enough data","drug_interactions":"Caution with CYP3A4 inhibitors and inducers\nCaution with alcohol and other CNS depressants","monitoring":"No routine monitoring","dosage":"IMH: Dayvigo 5mg; $2.14\nStarting: 5mg. Range: 5-10mg. Max: 10mg.\nStart 30 mins before bedtime, at least 7 hours before planned awakening.","clinical_pearls":"Risk of next day impairment increases with dose; caution at 10mg against next-day driving.","healthhub_slug":"lemborexant"},{"id":"prazosin","name":"Prazosin","category":"Sleep Medications","bottom_line":"Alpha-1 antagonist popular as treatment for PTSD associated insomnia/nightmares.","mechanism":"Alpha-1 adrenergic receptor antagonist\nPrimary hepatic metabolism (non CYP450)","indications":"FDA approval: Hypertension\nOff label: PTSD (insomnia, nightmares), Alcohol use disorder","side_effects":"Most common: Dizziness, Nausea, Sedation, Postural hypotension, Headache, Weakness\n\nSerious but rare:\n- Priapism (A&E if prolonged erection >4H)\n\nPregnancy and Breastfeeding: Insufficient data","drug_interactions":"Caution with other antihypertensive agents, diuretics, PDE5 inhibitors","monitoring":"Periodic blood pressure, postural blood pressure","dosage":"IMH: 1mg tab; $0.20\nPTSD: Starting: 1mg ON x 3/7 > 2mg ON > increase by 1mg ON/d weekly. Range: 1-5mg. Max: 5mg (up to 20mg/day in men, 12mg/day in women).\nTitrate slowly to minimize postural hypotension.","clinical_pearls":"Meta-analysis favors Prazosin for nightmares but NOT overall PTSD symptoms.\n2023 VA guidelines suggest for nightmares but not for overall PTSD symptoms.","healthhub_slug":"prazosin"},{"id":"propranolol","name":"Propranolol","category":"Sleep Medications","bottom_line":"Has several uses in psychiatry (performance anxiety, akathisia, drug-induced tremors). Favored as 'PRN' for anxiety when benzodiazepines are contraindicated.","mechanism":"Non-selective beta 1 and 2 adrenergic receptor antagonist\nMetabolized by CYP2D6, CYP1A2 and CYP2C19","indications":"FDA approval: Hypertension, Angina, Post-MI, Atrial fibrillation, Migraine prophylaxis, Essential tremor\nOff label: Performance anxiety, Tremor due to medication side effects, Akathisia","side_effects":"Most common: Dizziness, fatigue, bradycardia, hypotension, vivid dreams, sexual dysfunction\n\nPregnancy and Breastfeeding: Relatively safe","drug_interactions":"Caution with other antihypertensives\nCaution with CYP2D6 inhibitors (fluoxetine, paroxetine) and CYP1A2 inhibitors (fluvoxamine)","monitoring":"Periodic BP/HR","dosage":"IMH: 10/40mg tab; $0.20\nPerformance anxiety: 10mg 60 mins before performance.\nAkathisia: Start 10mg BD; Range: 30-40mg OD. Max: 90mg OD.\nMedication induced tremor: Start 10mg BD; Range: 30-40mg OD. Max: 120mg OD.","clinical_pearls":"Contraindicated in history of asthma, sinus bradycardia and heart block.","healthhub_slug":"propranolol"},{"id":"hydroxyzine","name":"Hydroxyzine","category":"Sleep Medications","bottom_line":"Non-addictive antihistamine; good option for rapid-acting anxiolytic or sedation; but monitor anticholinergic side effects.","mechanism":"Histamine H1 antagonist\nMetabolized through liver","indications":"FDA approval: Generalized Anxiety Disorder, Pruritus\nOff label: Other anxiety disorders, Insomnia","side_effects":"Most common: Sedation, Daytime grogginess, Dry mouth, Constipation, Headache\n\nSerious but rare: QTc prolongation; contraindicated in prolonged QTc\n\nPregnancy and Breastfeeding: Contraindicated in early pregnancy and breastfeeding","drug_interactions":"Avoid concomitant use with other antihistamines or anticholinergics","monitoring":"No routine monitoring","dosage":"IMH: Atarax 10/25mg; $0.20\nStarting: 10/25mg ON, increase by 25mg/d every 3-7d. Range: 25-100mg ON. Max: 100mg ON.","clinical_pearls":"On Beers Criteria (inappropriate medication in older adults due to anticholinergic burden and dementia risk).\nGenerally considered 2nd line in anxiety disorders.","healthhub_slug":"hydroxyzine"},{"id":"melatonin","name":"Melatonin","category":"Sleep Medications","bottom_line":"Short-term treatment modestly reduces time to fall asleep (~12mins) and does not significantly improve overall sleep time.","mechanism":"Melatonin receptor agonist\nMetabolized through CYP1A2","indications":"FDA approval: None\nOff label: Insomnia, jet lag, shift-work sleep disorder","side_effects":"Most common: Drowsiness, headache, dizziness, next-day grogginess, vivid dreams (higher doses)\n\nSerious but rare:\n- May exacerbate depressive symptoms\n\nPregnancy and Breastfeeding: Avoid in pregnancy","drug_interactions":"Fluvoxamine - potent CYP1A2 inhibitor that increases melatonin levels","monitoring":"No routine monitoring","dosage":"IMH: Circadin PR 2mg; $2.04\nStarting: 2mg. Range: 2mg. Max: 2mg. (Max duration: 13 weeks)\nOTC: 0.5-20mg. Jet lag: 1-3mg at bedtime for 3-5 days.","clinical_pearls":"OTC - 30 mins before bedtime ideal.\nIMH Circadin PR - 1-2 hours before bedtime, ideally with or after food.","healthhub_slug":"melatonin"},{"id":"donepezil","name":"Donepezil","category":"Dementia Medications","bottom_line":"Acetylcholinesterase inhibitor with good track record and tolerability. Generally considered 1st line agent for Alzheimer's dementia (AD). Delays dementia progression by 6-12 months.","mechanism":"Acetylcholinesterase inhibitor\nMetabolized through CYP2D6, 3A4","indications":"FDA approval: Mild/moderate AD (5/10mg), Moderate/Severe AD (10/23mg)\nOff label: Other memory disorders, mild cognitive impairment","side_effects":"Most common: Dose-related diarrhea, nausea, vomiting, weight loss, insomnia, abnormal dreams\n\nSerious but rare:\n- Bradycardia, prolonged QTc\n\nPregnancy and Breastfeeding: Not applicable","drug_interactions":"Avoid anticholinergic agents\nAvoid beta blockers - risk of bradycardia","monitoring":"Monitor HR/BMI","dosage":"IMH: 5/10mg tab; $0.40\nMild-Mod AD: Starting: 5mg OM, increase to 10mg OM after 4-6w. Max: 10mg.\nMod-Severe AD: Starting 10mg OM, may increase to 23mg OM after at least function toggleMobileSidebar() {

// ── BUILD SIDEBAR ──────────────────────────────────────────────────────
function groupBy(arr, key) {
  return arr.reduce((acc, item) => { (acc[item[key]] = acc[item[key]] || []).push(item); return acc; }, {});
}

function buildSidebar(meds, depots) {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  const cats = groupBy(meds, 'category');

  if (Object.keys(cats).length === 0 && depots.length === 0) {
    nav.innerHTML = '<p class="no-results">No medications found.</p>';
    return;
  }

  for (const [cat, items] of Object.entries(cats)) {
    const group = document.createElement('div');
    group.className = 'cat-group';
    const details = document.createElement('details');
    details.open = true;
    const summary = document.createElement('summary');
    summary.innerHTML = cat + '<span class="cat-count">' + items.length + '</span><span class="cat-chevron">&#9658;</span>';
    details.appendChild(summary);
    const ul = document.createElement('ul');
    ul.className = 'med-list';
    items.forEach(med => {
      const li = document.createElement('li');
      const btn = document.createElement('button');
      btn.className = 'med-item' + (state.activeId === med.id ? ' active' : '');
      btn.textContent = med.name;
      btn.dataset.id = med.id;
      btn.onclick = () => { selectMed(med.id); closeMobileSidebar(); };
      li.appendChild(btn);
      ul.appendChild(li);
    });
    details.appendChild(ul);
    group.appendChild(details);
    nav.appendChild(group);
  }

  // Depots as separate category
  if (depots.length > 0) {
    const group = document.createElement('div');
    group.className = 'cat-group';
    const details = document.createElement('details');
    details.open = true;
    const summary = document.createElement('summary');
    summary.innerHTML = '&#128137; Depots / LAIs<span class="cat-count">' + depots.length + '</span><span class="cat-chevron">&#9658;</span>';
    details.appendChild(summary);
    const ul = document.createElement('ul');
    ul.className = 'med-list';
    depots.forEach(depot => {
      const li = document.createElement('li');
      const btn = document.createElement('button');
      const depotKey = '__depot_' + depot.id + '__';
      btn.className = 'med-item' + (state.activeId === depotKey ? ' active' : '');
      btn.dataset.id = depotKey;
      btn.classList.add('med-item--depot');
      btn.innerHTML = '<span class="depot-name">' + depot.name + '</span><span class="depot-sub">' + depot.subtitle + '</span>';
      btn.onclick = () => { selectDepot(depot.id); closeMobileSidebar(); };
      li.appendChild(btn);
      ul.appendChild(li);
    });
    details.appendChild(ul);
    group.appendChild(details);
    nav.appendChild(group);
  }
}

buildSidebar(MED_DATA, DEPOT_DATA);

// ── SEARCH ─────────────────────────────────────────────────────────────
function filterMeds(q) {
  const lq = q.toLowerCase().trim();
  if (!lq) { buildSidebar(MED_DATA, DEPOT_DATA); syncActiveBtn(); return; }
  const filteredMeds = MED_DATA.filter(m => m.name.toLowerCase().includes(lq) || m.category.toLowerCase().includes(lq));
  const filteredDepots = DEPOT_DATA.filter(d => d.name.toLowerCase().includes(lq) || d.subtitle.toLowerCase().includes(lq) || 'depot lai injectable'.includes(lq));
  buildSidebar(filteredMeds, filteredDepots);
  syncActiveBtn();
}
function syncActiveBtn() {
  if (!state.activeId) return;
  const btn = document.querySelector('.med-item[data-id="' + state.activeId + '"]');
  if (btn) btn.classList.add('active');
}

// ── SELECT MED ─────────────────────────────────────────────────────────
function selectMed(id) {
  const med = MED_BY_ID[id];
  if (!med) return;
  state.activeId = id;
  document.querySelectorAll('.med-item').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  document.getElementById('welcomeScreen').style.display = 'none';
  const display = document.getElementById('medDisplay');
  display.style.display = 'block';
  display.innerHTML = renderMed(med);
  document.getElementById('mainContent').scrollTop = 0;
}

function renderMed(med) {
  const hh = med.healthhub_slug ? 'https://www.healthhub.sg/a-z/medications/' + med.healthhub_slug : null;
  const cleanName = med.name.replace(/\s*\(.*?\)\s*/g, '').trim().split(' ')[0].toLowerCase();
  const utdUrl = 'https://www.uptodate.com/contents/' + cleanName + '-drug-information';
  let h = '<div class="med-sticky-header">';
  h += '<h1>' + esc(med.name) + '</h1>';
  h += '<span class="cat-pill">' + esc(med.category) + '</span>';
  h += '<div class="header-actions">';
  h += '<button class="btn-copy" id="copyBtn" onclick="copySideEffects()">Copy Side Effects (S)</button>';
  h += '<a class="btn-hh" href="' + utdUrl + '" target="_blank">UpToDate (U)</a>';
  if (hh) h += '<a class="btn-hh" href="' + hh + '" target="_blank">HealthHub (H)</a>';
  h += '</div></div>';
  if (med.bottom_line) {
    h += '<div class="bottom-line-card"><strong>Bottom Line</strong>' + esc(med.bottom_line) + '</div>';
  }
  h += '<div class="sections-container">';
  SECTION_DEFS.forEach(({key, icon, label}) => {
    if (!med[key]) return;
    const isOpen = DEFAULT_OPEN[key] ? 'open' : '';
    h += '<details class="section-details" ' + isOpen + ' data-section="' + key + '">';
    h += '<summary class="section-summary"><span class="section-icon">' + icon + '</span>' + label + '<span class="section-chevron">&#9658;</span></summary>';
    h += '<div class="section-body">' + renderSectionContent(key, med[key]) + '</div>';
    h += '</details>';
  });
  h += '</div>';
  return h;
}

function renderSectionContent(key, raw) {
  let e = esc(raw);
  if (key === 'side_effects') {
    e = e.replace(/Most common:/g, '<span class="label-highlight">Most common:</span>');
    e = e.replace(/Serious but rare:/g, '<span class="label-serious">Serious but rare:</span>');
    e = e.replace(/Serious but rare(?!:)/g, '<span class="label-serious">Serious but rare</span>');
    e = e.replace(/Most common(?!:)/g, '<span class="label-highlight">Most common</span>');
  }
  return e;
}

// ── SELECT DEPOT ────────────────────────────────────────────────────────
function selectDepot(id) {
  const depot = DEPOT_BY_ID[id];
  if (!depot) return;
  const key = '__depot_' + id + '__';
  state.activeId = key;
  document.querySelectorAll('.med-item').forEach(b => b.classList.toggle('active', b.dataset.id === key));
  document.getElementById('welcomeScreen').style.display = 'none';
  const display = document.getElementById('medDisplay');
  display.style.display = 'block';
  display.innerHTML = renderDepotPage(depot);
  document.getElementById('mainContent').scrollTop = 0;
}

function renderDepotPage(depot) {
  const typeClass = depot.type === 'Typical' ? 'typical' : 'atypical';
  let h = '<div class="med-sticky-header">';
  h += '<h1>&#128137; ' + esc(depot.name) + '</h1>';
  h += '<span class="cat-pill">' + esc(depot.subtitle) + '</span>';
  h += '</div>';
  h += '<div class="sections-container">';
  h += '<details class="section-details" open>';
  h += '<summary class="section-summary"><span class="section-icon">&#128137;</span>' + esc(depot.name);
  h += '<span class="depot-type-pill ' + typeClass + '">' + depot.type + '</span>';
  h += '<span class="section-chevron">&#9658;</span></summary>';
  h += '<div class="section-body section-body--normal">';
  depot.sections.forEach(s => {
    h += '<div class="depot-section-item"><span class="depot-section-label">' + esc(s.label) + '</span>';
    h += '<div class="depot-section-text">' + esc(s.text) + '</div></div>';
  });
  h += '</div></details></div>';
  return h;
}

// ── COPY SIDE EFFECTS ───────────────────────────────────────────────────
function copySideEffects() {
  const med = MED_BY_ID[state.activeId];
  if (!med || !med.side_effects) return;
  const lines = med.side_effects.split('\n');
  const filtered = lines.filter(l => !l.toLowerCase().includes('pregnancy') && !l.toLowerCase().includes('breastfeeding'));
  while (filtered.length && !filtered[filtered.length-1].trim()) filtered.pop();
  navigator.clipboard.writeText(filtered.join('\n').trim()).then(() => {
    const btn = document.getElementById('copyBtn');
    if (btn) { btn.classList.add('copied'); btn.textContent = 'Copied!'; setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'Copy Side Effects'; }, 2000); }
    showToast('Side effects copied!');
  }).catch(() => showToast('Copy failed'));
}

// ── TOAST ──────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

mainEl.addEventListener('scroll', () => {
  document.getElementById('fabTop').classList.toggle('visible', mainEl.scrollTop > 300);
});
function scrollMainToTop() { mainEl.scrollTo({top:0,behavior:'smooth'}); }

// ── UTILITY ────────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

<script>
// 1. A global Set to remember the titles of the sections that are currently open.
const openSections = new Set();
let isFirstRender = true;

// 2. Listen for the 'toggle' event on all <details> elements.
// We use the capture phase (true) because 'toggle' events do not bubble up the DOM.
document.addEventListener('toggle', (e) => {
  if (e.target.tagName === 'DETAILS') {
    const summary = e.target.querySelector('summary');
    if (summary) {
      // Use the summary text (e.g., "Side Effects") as the unique identifier
      const sectionTitle = summary.textContent.trim();
      
      if (e.target.open) {
        openSections.add(sectionTitle);
      } else {
        openSections.delete(sectionTitle);
      }
    }
  }
}, true);

// 3. Automatically apply the tracked states to newly rendered sections.
const medDisplayContainer = document.getElementById('medDisplay');

if (medDisplayContainer) {
  const observer = new MutationObserver(() => {
    const detailsElements = medDisplayContainer.querySelectorAll('details');
    
    if (isFirstRender && detailsElements.length > 0) {
      // On the very first medication loaded, record whatever is open by default
      detailsElements.forEach(details => {
        if (details.open) {
          const summary = details.querySelector('summary');
          if (summary) openSections.add(summary.textContent.trim());
        }
      });
      isFirstRender = false;
    } else {
      // On subsequent medications, force the sections to match the synchronized state
      detailsElements.forEach(details => {
        const summary = details.querySelector('summary');
        if (summary) {
          const sectionTitle = summary.textContent.trim();
          // This will open or close the section based on whether it's in our Set
          details.open = openSections.has(sectionTitle);
        }
      });
    }
  });

  // Watch the #medDisplay container for any HTML changes (like switching medications)
  observer.observe(medDisplayContainer, { childList: true, subtree: true });
}
</script>

  }
`;
document.head.appendChild(focusStyle);

// 3. Keyboard Navigation (Up/Down/Enter)
document.addEventListener('keydown', (e) => {
  if (!['ArrowUp', 'ArrowDown', 'Enter'].includes(e.key)) return;

  const searchInput = document.getElementById('searchInput');
  
  // Only target medication items that are currently visible (i.e. category is expanded)
  const visibleItems = Array.from(document.querySelectorAll('.med-item')).filter(el => {
    return el.offsetWidth > 0 && el.offsetHeight > 0;
  });

  const activeElement = document.activeElement;
  const currentIndex = visibleItems.indexOf(activeElement);

  if (e.key === 'ArrowDown') {
    // If focused on the search box, arrow down jumps to the first medication
    if (activeElement === searchInput) {
      e.preventDefault();
      if (visibleItems.length > 0) visibleItems[0].focus();
    } 
    // If focused on a medication, jump to the next one
    else if (currentIndex >= 0 && currentIndex < visibleItems.length - 1) {
      e.preventDefault();
      visibleItems[currentIndex + 1].focus();
    }
  } 
  else if (e.key === 'ArrowUp') {
    // If focused on the first medication, arrow up jumps back to the search box
    if (currentIndex === 0) {
      e.preventDefault();
      searchInput.focus();
    } 
    // If focused on a medication, jump to the previous one
    else if (currentIndex > 0) {
      e.preventDefault();
      visibleItems[currentIndex - 1].focus();
    }
  } 
  else if (e.key === 'Enter') {
    // Pressing Enter simulates a click on the currently focused medication
    if (currentIndex >= 0) {
      e.preventDefault();
      visibleItems[currentIndex].click();
    }
  }
});
</script>
<script>
// 4. Global Search Shortcut ('/' key)
document.addEventListener('keydown', (e) => {
  // Check if the '/' key was pressed
  if (e.key === '/') {
    // Check what element is currently focused
    const activeTag = document.activeElement.tagName.toLowerCase();
    
    // If the user is already typing inside an input box (like the search bar) 
    // or a text area, let them type the '/' character normally.
    if (activeTag !== 'input' && activeTag !== 'textarea') {
      e.preventDefault(); // Stops the '/' character from actually being typed into the box
      const searchInput = document.getElementById('searchInput');
      
      if (searchInput) {
        searchInput.focus();
        
        // Optional: If you are on mobile, this will also open the sidebar so you can see the search
        if (document.body.classList.contains('mobile-mode') || window.innerWidth <= 768) {
          document.getElementById('sidebar').classList.add('open');
          document.getElementById('mobileOverlay').classList.add('visible');
        }
      }
    }
  }
});

<script>
// --- EXPAND / COLLAPSE ALL FEATURE (UPDATED WITH LABELS) ---

// 1. Add Expand/Collapse buttons to the Sidebar (below the search bar)
function addSidebarToggles() {
  const sidebarSearch = document.querySelector('.sidebar-search');
  if (!sidebarSearch || document.getElementById('sidebarToggleContainer')) return;

  const toggleContainer = document.createElement('div');
  toggleContainer.id = 'sidebarToggleContainer';
  toggleContainer.className = 'sidebar-toggle-row';

  const expandBtn = document.createElement('button');
  expandBtn.className = 'sidebar-toggle-btn';
  // Updated label and added hover tooltip
  expandBtn.innerHTML = '&#8609; Expand All (E)';
  expandBtn.title = "Keyboard Shortcut: E";
  expandBtn.onclick = () => document.querySelectorAll('#sidebarNav details').forEach(d => d.open = true);

  const collapseBtn = document.createElement('button');
  collapseBtn.className = 'sidebar-toggle-btn';
  // Updated label and added hover tooltip
  collapseBtn.innerHTML = '&#8607; Collapse All (C)';
  collapseBtn.title = "Keyboard Shortcut: C";
  collapseBtn.onclick = () => document.querySelectorAll('#sidebarNav details').forEach(d => d.open = false);

  toggleContainer.appendChild(expandBtn);
  toggleContainer.appendChild(collapseBtn);
  sidebarSearch.appendChild(toggleContainer);
}

// 2. Add an Expand/Collapse button to the Medication Details header
function addExpandCollapseToHeader() {
  const header = document.querySelector('.med-sticky-header');
  if (!header) return;
  
  let actions = header.querySelector('.header-actions');
  if (!actions) {
    actions = document.createElement('div');
    actions.className = 'header-actions';
    header.appendChild(actions);
  }
  
  // Remove if it already exists to prevent duplicates
  const existing = document.getElementById('notesToggleBtn');
  if (existing) existing.remove();
  
  const btn = document.createElement('button');
  btn.id = 'notesToggleBtn';
  btn.className = 'btn-copy'; 
  btn.innerHTML = '&#8597; Toggle Sections (T)';
  
  btn.onclick = () => {
    const detailsElements = document.querySelectorAll('.sections-container details');
    if (detailsElements.length === 0) return;
    
    // Check the first section to decide whether we are opening or closing them all
    const shouldOpen = !detailsElements[0].open;
    
    detailsElements.forEach(details => {
      details.open = shouldOpen;
      
      // Update the global openSections Set from our synchronization script
      const summary = details.querySelector('summary');
      if (summary && typeof openSections !== 'undefined') {
        const sectionTitle = summary.textContent.trim();
        if (shouldOpen) {
          openSections.add(sectionTitle);
        } else {
          openSections.delete(sectionTitle);
        }
      }
    });
  };
  
  // Insert it at the beginning of the actions row
  actions.insertBefore(btn, actions.firstChild);
}

// 3. Hook into your existing functions
if (!window.expandHookAdded) {
  const existingSelectMedExpand = window.selectMed;
  window.selectMed = function(id) {
    existingSelectMedExpand(id);
    addExpandCollapseToHeader();
  };

  const existingSelectDepotExpand = window.selectDepot;
  window.selectDepot = function(id) {
    existingSelectDepotExpand(id);
    addExpandCollapseToHeader();
  };
  window.expandHookAdded = true;
}

// 4. Initialize the sidebar buttons on page load
addSidebarToggles();
</script>
<script>
// --- FAVORITES / BOOKMARKING FEATURE (UPDATED) ---

// 1. Helper functions to save and load favorites securely from LocalStorage
function getFavorites() {
  try { return JSON.parse(localStorage.getItem('medref-favorites')) || []; } 
  catch (e) { return []; }
}

function toggleFavorite(id) {
  let favs = getFavorites();
  if (favs.includes(id)) {
    favs = favs.filter(f => f !== id);
  } else {
    favs.push(id);
  }
  localStorage.setItem('medref-favorites', JSON.stringify(favs));
}

// 2. Inject the Favorite STAR directly into the H1 title
function addFavoriteButtonToHeader(id) {
  const header = document.querySelector('.med-sticky-header');
  if (!header) return;
  
  const h1 = header.querySelector('h1');
  if (!h1) return;
  
  // Remove any existing star to prevent duplicates when clicking
  const existing = h1.querySelector('.btn-fav-star');
  if (existing) existing.remove();

  // Clean up the old blocky button from the actions menu if it's still lingering
  const oldBtn = header.querySelector('.btn-fav');
  if (oldBtn) oldBtn.remove();
  
  const isFav = getFavorites().includes(id);
  
  const btn = document.createElement('button');
  btn.className = 'btn-fav-star';
  if (isFav) btn.classList.add('is-active');
  btn.innerHTML = isFav ? '&#11088;' : '&#9734;'; // Solid star vs empty star
  btn.title = isFav ? 'Remove from Favorites' : 'Add to Favorites';
  
  // When clicked, toggle state, rebuild button, and refresh the sidebar
  btn.onclick = () => {
    toggleFavorite(id);
    addFavoriteButtonToHeader(id); 
    
    const searchTerm = document.getElementById('searchInput').value;
    filterMeds(searchTerm); 
    
    showToast(isFav ? 'Removed from Favorites' : 'Added to Favorites');
  };
  
  // Append the star directly inside the H1 tag
  h1.appendChild(btn);
}

// 3. Hook into your existing functions
// (Using a flag to ensure we don't double-hook if the script re-runs)
if (!window.favHookAdded) {
  const originalSelectMedFav = window.selectMed;
  window.selectMed = function(id) {
    originalSelectMedFav(id);
    addFavoriteButtonToHeader(id);
  };

  const originalSelectDepotFav = window.selectDepot;
  window.selectDepot = function(id) {
    originalSelectDepotFav(id);
    const depotKey = '__depot_' + id + '__';
    addFavoriteButtonToHeader(depotKey);
  };

  const originalBuildSidebarFav = window.buildSidebar;
  window.buildSidebar = function(meds, depots) {
    originalBuildSidebarFav(meds, depots);
    
    const favIds = getFavorites();
    if (favIds.length === 0) return;
    
    const favMeds = meds.filter(m => favIds.includes(m.id));
    const favDepots = depots.filter(d => favIds.includes('__depot_' + d.id + '__'));
    
    if (favMeds.length === 0 && favDepots.length === 0) return;
    
    const nav = document.getElementById('sidebarNav');
    const group = document.createElement('div');
    group.className = 'cat-group';
    
    const details = document.createElement('details');
    details.open = true; 
    
    const summary = document.createElement('summary');
    const count = favMeds.length + favDepots.length;
    summary.innerHTML = '&#11088; Favorites<span class="cat-count">' + count + '</span><span class="cat-chevron">&#9658;</span>';
    details.appendChild(summary);
    
    const ul = document.createElement('ul');
    ul.className = 'med-list';
    
    favMeds.forEach(med => {
      const li = document.createElement('li');
      const btn = document.createElement('button');
      btn.className = 'med-item' + (state.activeId === med.id ? ' active' : '');
      btn.textContent = med.name;
      btn.dataset.id = med.id;
      btn.onclick = () => { selectMed(med.id); closeMobileSidebar(); };
      li.appendChild(btn);
      ul.appendChild(li);
    });
    
    favDepots.forEach(depot => {
      const li = document.createElement('li');
      const btn = document.createElement('button');
      const depotKey = '__depot_' + depot.id + '__';
      btn.className = 'med-item' + (state.activeId === depotKey ? ' active' : '');
      btn.dataset.id = depotKey;
      btn.classList.add('med-item--depot');
      btn.innerHTML = '<span class="depot-name">' + depot.name + '</span><span class="depot-sub">' + depot.subtitle + '</span>';
      btn.onclick = () => { selectDepot(depot.id); closeMobileSidebar(); };
      li.appendChild(btn);
      ul.appendChild(li);
    });
    
    details.appendChild(ul);
    group.appendChild(details);
    nav.prepend(group);
  };
  
  window.favHookAdded = true;
}

// 4. Trigger an initial sidebar rebuild
buildSidebar(MED_DATA, DEPOT_DATA);
</script>
<script>
// --- SIDEBAR / SECTION SHORTCUTS ('E', 'C', 'T', 'S', 'U', and 'H') ---
document.addEventListener('keydown', (e) => {
  // 1. Check what element the user is currently focused on
  const activeTag = document.activeElement.tagName.toLowerCase();
  
  // 2. If they are typing in the search box (or any input), ignore the shortcut
  if (activeTag === 'input' || activeTag === 'textarea') return;

  // 3. 'E' key to Expand All in the sidebar
  if (e.key.toLowerCase() === 'e') {
    const details = document.querySelectorAll('#sidebarNav details');
    if (details.length > 0) {
      details.forEach(d => d.open = true);
      showToast('Sidebar Expanded');
    }
  }
  
  // 4. 'C' key to Collapse All in the sidebar
  if (e.key.toLowerCase() === 'c') {
    const details = document.querySelectorAll('#sidebarNav details');
    if (details.length > 0) {
      details.forEach(d => d.open = false);
      showToast('Sidebar Collapsed');
    }
  }

  // 5. 'T' key to Toggle all sections in the medication details area
  if (e.key.toLowerCase() === 't') {
    const detailsElements = document.querySelectorAll('.sections-container details');
    if (detailsElements.length > 0) {
      const shouldOpen = !detailsElements[0].open;
      detailsElements.forEach(details => {
        details.open = shouldOpen;
        const summary = details.querySelector('summary');
        if (summary && typeof openSections !== 'undefined') {
          const sectionTitle = summary.textContent.trim();
          if (shouldOpen) {
            openSections.add(sectionTitle);
          } else {
            openSections.delete(sectionTitle);
          }
        }
      });
      showToast(shouldOpen ? 'Sections Expanded' : 'Sections Collapsed');
    }
  }

  // 6. 'S' key to copy side effects for the active medication
  if (e.key.toLowerCase() === 's') {
    copySideEffects();
  }

  // 7. 'U' key to open UpToDate link for the active medication
  if (e.key.toLowerCase() === 'u') {
    const utdLink = Array.from(document.querySelectorAll('.med-sticky-header .btn-hh'))
      .find(a => a.textContent.toLowerCase().includes('uptodate'));
    if (utdLink && utdLink.href) {
      window.open(utdLink.href, '_blank');
    }
  }

  // 8. 'H' key to open HealthHub link for the active medication (if present)
  if (e.key.toLowerCase() === 'h') {
    const hhLink = Array.from(document.querySelectorAll('.med-sticky-header .btn-hh'))
      .find(a => a.textContent.toLowerCase().includes('healthhub'));
    if (hhLink && hhLink.href) {
      window.open(hhLink.href, '_blank');
    }
  }

});
</script>
